<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCPP Log Analyzer</title>
    <link rel="stylesheet" href="/static/style-terminal.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-logo">
        <span class="logo-icon">█</span>
        <span class="logo-text">OCPP_ANALYZER<span class="cursor">_</span></span>
      </div>
      <div class="header-right">
        <span class="header-tag">// OCPP 1.6 Diagnostic Tool</span>
      </div>
    </header>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-inner">
        <div class="settings-group">
          <label class="settings-label" for="ollamaUrl">&gt; OLLAMA_URL</label>
          <input id="ollamaUrl" type="text" class="input" placeholder="http://your-vps:11434" value="http://localhost:11434" />
        </div>
        <div class="settings-group">
          <label class="settings-label" for="modelSelect">&gt; MODEL</label>
          <select id="modelSelect" class="select">
            <option value="">-- select model --</option>
          </select>
        </div>
        <button id="loadModelsBtn" class="btn btn-secondary">[LOAD_MODELS]</button>
        <span id="modelsStatus" class="status-text"></span>
      </div>
    </div>

    <main class="main-grid">
      <div class="panel left-panel">
        <div class="input-toolbar">
          <span class="toolbar-title">&gt; LOG_INPUT</span>
          <label class="btn-tool" for="fileInput" title="Datei wählen">[📂]</label>
          <input id="fileInput" type="file" class="file-input-hidden" accept=".log,.txt,.json" />
          <button id="exampleBtn" class="btn-tool" title="Beispiel laden">[EX]</button>
          <button id="settingsToggle" class="btn-tool" title="KI-Einstellungen">[CFG]</button>
          <button id="clearBtn" class="btn-tool btn-tool-danger" title="Log leeren">[CLR]</button>
        </div>

        <div class="context-section">
          <label class="context-label">&gt; CUSTOMER_CONTEXT <span class="context-hint">(optional)</span></label>
          <textarea
            id="customerContext"
            class="context-textarea"
            rows="3"
            maxlength="500"
            placeholder="// Gemeldetes Problem beschreiben..."
            spellcheck="true"
          ></textarea>
        </div>

        <textarea
          id="logInput"
          class="log-textarea"
          placeholder='// OCPP 1.6 Log hier einfügen...\n// Format: [2,"id","Action",{...}]'
          spellcheck="false"
        ></textarea>

        <div class="char-count">
          <span id="charCount">0</span> chars
          <span class="sep">|</span>
          <span id="lineCount">0</span> lines
        </div>

        <div class="actions">
          <button id="parseBtn" class="btn btn-primary">[PARSE]</button>
          <button id="analyzeBtn" class="btn btn-accent">[AI_ANALYZE]</button>
          <button id="draftEmailBtn" class="btn btn-secondary">[EXPLAIN]</button>
        </div>
      </div>

      <div class="panel right-panel">
        <div class="tabs">
          <button class="tab active" data-tab="issues">
            [ISSUES]<span id="issuesBadge" class="tab-badge hidden">0</span>
          </button>
          <button class="tab" data-tab="messages">[MESSAGES]</button>
          <button class="tab" data-tab="analysis">[AI_ANALYSIS]</button>
          <button class="tab" data-tab="email">[EXPLAIN]</button>
        </div>

        <div id="tab-issues" class="tab-content active">
          <div class="empty-state">
            <div class="empty-icon">// OK</div>
            <div>no issues detected</div>
          </div>
        </div>
        <div id="tab-messages" class="tab-content hidden">
          <div class="empty-state">
            <div class="empty-icon">// EMPTY</div>
            <div>parse log to display messages</div>
          </div>
        </div>
        <div id="tab-analysis" class="tab-content hidden">
          <div class="empty-state">
            <div class="empty-icon">// STANDBY</div>
            <div>run [AI_ANALYZE] to start</div>
          </div>
        </div>
        <div id="tab-email" class="tab-content hidden">
          <div class="empty-state">
            <div class="empty-icon">// STANDBY</div>
            <div>run [EXPLAIN] to generate summary</div>
          </div>
        </div>
      </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
