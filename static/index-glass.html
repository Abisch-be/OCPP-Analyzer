<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCPP Log Analyzer</title>
    <link rel="stylesheet" href="/static/style-glass.css" />
  </head>
  <body>
    <div class="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>

    <header class="header">
      <div class="header-logo">
        <div class="logo-icon">⚡</div>
        <span class="logo-text">OCPP Analyzer</span>
        <span class="logo-pill">v1.6</span>
      </div>
      <div class="header-right">
        <span class="header-status">
          <span class="status-dot"></span>
          System bereit
        </span>
      </div>
    </header>

    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-inner">
        <div class="settings-group">
          <label class="settings-label" for="ollamaUrl">Ollama URL</label>
          <input id="ollamaUrl" type="text" class="input" placeholder="http://your-vps:11434" value="http://localhost:11434" />
        </div>
        <div class="settings-group">
          <label class="settings-label" for="modelSelect">Modell</label>
          <select id="modelSelect" class="select">
            <option value="">-- Modelle laden --</option>
          </select>
        </div>
        <button id="loadModelsBtn" class="btn btn-secondary">🔄 Modelle laden</button>
        <span id="modelsStatus" class="status-text"></span>
      </div>
    </div>

    <main class="main-grid">
      <div class="panel left-panel">
        <div class="input-toolbar">
          <span class="toolbar-title">Log Eingabe</span>
          <label class="btn-tool" for="fileInput" title="Datei wählen">📂</label>
          <input id="fileInput" type="file" class="file-input-hidden" accept=".log,.txt,.json" />
          <button id="exampleBtn" class="btn-tool" title="Beispiel laden">📋</button>
          <button id="settingsToggle" class="btn-tool" title="KI-Einstellungen">⚙️</button>
          <button id="clearBtn" class="btn-tool btn-tool-danger" title="Log leeren">🗑️</button>
        </div>

        <div class="context-section">
          <label class="context-label">
            🗣️ Kundenkontext
            <span class="context-hint">optional</span>
          </label>
          <textarea
            id="customerContext"
            class="context-textarea"
            rows="3"
            maxlength="500"
            placeholder="Gemeldetes Problem beschreiben..."
            spellcheck="true"
          ></textarea>
        </div>

        <textarea
          id="logInput"
          class="log-textarea"
          placeholder='OCPP 1.6 Log hier einfügen...&#10;&#10;Format: [2,"id","Action",{...}]'
          spellcheck="false"
        ></textarea>

        <div class="char-count">
          <span id="charCount">0</span> Zeichen
          <span class="sep">|</span>
          <span id="lineCount">0</span> Zeilen
        </div>

        <div class="actions">
          <button id="parseBtn" class="btn btn-primary">🔍 Parsen</button>
          <button id="analyzeBtn" class="btn btn-accent">🤖 KI-Analyse</button>
          <button id="draftEmailBtn" class="btn btn-secondary">💡 Erklärung</button>
        </div>
      </div>

      <div class="panel right-panel">
        <div class="tabs">
          <button class="tab active" data-tab="issues">
            🚨 Issues
            <span id="issuesBadge" class="tab-badge hidden">0</span>
          </button>
          <button class="tab" data-tab="messages">💬 Nachrichten</button>
          <button class="tab" data-tab="analysis">🔬 KI-Analyse</button>
          <button class="tab" data-tab="email">💡 Erklärung</button>
        </div>

        <div id="tab-issues" class="tab-content active">
          <div class="empty-state">
            <div class="empty-icon">✅</div>
            <div>Keine Issues erkannt</div>
          </div>
        </div>
        <div id="tab-messages" class="tab-content hidden">
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div>Log parsen um Nachrichten anzuzeigen</div>
          </div>
        </div>
        <div id="tab-analysis" class="tab-content hidden">
          <div class="empty-state">
            <div class="empty-icon">🔬</div>
            <div>„KI-Analyse" klicken</div>
          </div>
        </div>
        <div id="tab-email" class="tab-content hidden">
          <div class="empty-state">
            <div class="empty-icon">💡</div>
            <div>„Erklärung" klicken</div>
          </div>
        </div>
      </div>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
